<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 230" role="img" aria-label="claude-harness — a lean, stack-agnostic, Claude-Code-only agent harness">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e2805f"/>
      <stop offset="0.55" stop-color="#d06b48"/>
      <stop offset="1" stop-color="#bd5733"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.16"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect x="2" y="2" width="896" height="226" rx="20" fill="url(#bg)"/>
  <rect x="2" y="2" width="896" height="120" rx="20" fill="url(#sheen)"/>

  <!-- faint two-layer motif, top-right -->
  <g opacity="0.13" fill="none" stroke="#ffffff" stroke-width="2.5">
    <rect x="690" y="40" width="150" height="46" rx="10"/>
    <rect x="714" y="100" width="150" height="46" rx="10"/>
    <path d="M765 86 v14" stroke-dasharray="3 4"/>
  </g>

  <!-- monogram: stacked layers in a rounded badge -->
  <g transform="translate(58,73)">
    <rect width="84" height="84" rx="20" fill="#ffffff" fill-opacity="0.14"/>
    <rect width="84" height="84" rx="20" fill="none" stroke="#ffffff" stroke-opacity="0.45" stroke-width="1.5"/>
    <rect x="20" y="24" width="44" height="15" rx="5" fill="#fdeee6"/>
    <rect x="20" y="45" width="44" height="15" rx="5" fill="#fdeee6" fill-opacity="0.62"/>
    <path d="M42 39 v6" stroke="#fdeee6" stroke-width="2" stroke-opacity="0.7"/>
  </g>

  <!-- wordmark -->
  <text x="172" y="106" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="52" font-weight="700" fill="#ffffff" letter-spacing="-1">claude-harness</text>

  <!-- tagline -->
  <text x="174" y="146" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="20.5" fill="#fdeee6" fill-opacity="0.95">A lean, stack-agnostic, Claude-Code-only agent harness.</text>

  <!-- chips -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13.5" fill="#ffffff">
    <g transform="translate(174,176)">
      <rect width="76" height="26" rx="13" fill="#ffffff" fill-opacity="0.16"/>
      <text x="38" y="17.5" text-anchor="middle">skills</text>
    </g>
    <g transform="translate(258,176)">
      <rect width="78" height="26" rx="13" fill="#ffffff" fill-opacity="0.16"/>
      <text x="39" y="17.5" text-anchor="middle">hooks</text>
    </g>
    <g transform="translate(344,176)">
      <rect width="104" height="26" rx="13" fill="#ffffff" fill-opacity="0.16"/>
      <text x="52" y="17.5" text-anchor="middle">subagents</text>
    </g>
    <g transform="translate(456,176)">
      <rect width="150" height="26" rx="13" fill="#ffffff" fill-opacity="0.16"/>
      <text x="75" y="17.5" text-anchor="middle">SessionStart hooks</text>
    </g>
  </g>
</svg>
